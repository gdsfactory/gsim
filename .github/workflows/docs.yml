name: Docs
on:
  workflow_dispatch:
env:
  GFP_API_KEY: ${{ secrets.GFP_API_KEY }}
  PLOTLY_RENDERER: notebook_connected
jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Install UV
        uses: astral-sh/setup-uv@v5
      - name: Install Just
        uses: taiki-e/install-action@just
      - name: Install svgbob
        run: cargo install svgbob_cli
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libglu1-mesa libosmesa6 xvfb
      - name: Create environment
        run: just dev
      - name: Install all notebook PDKs
        run: |
          uv pip install ubcpdk ihp-gdsfactory
          uv pip install "qpdk @ git+https://github.com/gdsfactory/quantum-rf-pdk.git"
      - name: Create ipykernel
        run: uv run --no-sync python -m ipykernel install --user --name gsim
      - name: Find and run notebooks
        run: |
          nbs=$(grep -oE 'nbs/[^ ]+\.md' mkdocs.yml | sed 's/\.md$/.ipynb/' | sort)
          for nb in $nbs; do
            echo "=== Running $nb ==="
            dir=$(dirname "$nb")
            filename=$(basename "$nb")
            cd "$dir" && xvfb-run -a uv run --no-sync papermill "$filename" "$filename" -k gsim && cd -
          done
      - name: Build docs
        run: |
          just nbdocs
          just docs
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
  pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
